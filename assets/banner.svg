<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF007F;stop-opacity:1">
        <animate attributeName="stop-color" values="#FF007F;#4facfe;#00f2fe;#FF007F" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1">
        <animate attributeName="stop-color" values="#4facfe;#00f2fe;#FF007F;#4facfe" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" rx="15" ry="15" />
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
    Gradient Accumulation
  </text>
  <text x="50%" y="75%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">
    A Curated Collection of Models, Strategies & Insights
  </text>
</svg>
